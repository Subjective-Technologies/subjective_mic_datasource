<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1a1230"/>
      <stop offset="100%" stop-color="#050014"/>
    </radialGradient>
    <linearGradient id="capsule" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff5ddc"/>
      <stop offset="100%" stop-color="#7a1bff"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e0ff"/>
      <stop offset="100%" stop-color="#8a5bff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#00e0ff" stroke-width="1.2" stroke-opacity="0.55"/>

  <g opacity="0.55" filter="url(#softglow)">
    <path d="M14 40 a18 18 0 0 0 36 0" fill="none" stroke="#00e0ff" stroke-width="3" stroke-linecap="round"/>
  </g>
  <path d="M14 40 a18 18 0 0 0 36 0" fill="none" stroke="url(#arc)" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"/>

  <g filter="url(#glow)">
    <rect x="24" y="10" width="16" height="28" rx="8" fill="url(#capsule)" stroke="#ff7bf0" stroke-width="1.2"/>
    <line x1="27" y1="18" x2="37" y2="18" stroke="#ffc6f5" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="27" y1="24" x2="37" y2="24" stroke="#ffc6f5" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="27" y1="30" x2="37" y2="30" stroke="#ffc6f5" stroke-width="1" stroke-opacity="0.7"/>
  </g>

  <line x1="32" y1="44" x2="32" y2="52" stroke="#00e0ff" stroke-width="2.4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="24" y1="54" x2="40" y2="54" stroke="#00e0ff" stroke-width="2.4" stroke-linecap="round" filter="url(#glow)"/>

  <circle cx="18" cy="14" r="1.2" fill="#00e0ff" opacity="0.9"/>
  <circle cx="48" cy="20" r="1" fill="#ff5ddc" opacity="0.9"/>
  <circle cx="50" cy="48" r="1" fill="#00e0ff" opacity="0.8"/>
  <circle cx="14" cy="50" r="1.2" fill="#ff5ddc" opacity="0.8"/>
</svg>
